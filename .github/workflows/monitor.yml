# ══════════════════════════════════════════════════════════════
# Pokemon TCG Restock Monitor — GitHub Actions Workflow
# ══════════════════════════════════════════════════════════════
# This file tells GitHub to run monitor.py automatically.
# You do NOT need to edit this file.
# ══════════════════════════════════════════════════════════════

name: Pokemon TCG Restock Monitor

on:
  schedule:
    # Run every 15 minutes (this is the minimum GitHub allows)
    # GitHub may delay scheduled runs by up to 10–20 mins during busy periods
    - cron: '*/15 * * * *'

  # Adds a manual "Run workflow" button in the GitHub Actions tab
  # Great for testing without waiting for the next schedule
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest   # free Linux virtual machine

    # Required so the job can write state.json back to your repo
    permissions:
      contents: write

    steps:

      # Step 1: Download your repo files onto the virtual machine
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      # Step 2: Install Python 3.11
      - name: 🐍 Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Step 3: Install the libraries listed in requirements.txt
      - name: 📦 Install dependencies
        run: pip install -r requirements.txt

      # Step 4: Run the monitor
      # TELEGRAM_BOT_TOKEN and TELEGRAM_CHAT_ID are loaded from GitHub Secrets
      # (Settings → Secrets and variables → Actions → New repository secret)
      - name: 🔍 Run restock monitor
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python monitor.py

      # Step 5: Save the updated state.json back to the repo
      # The [skip ci] tag prevents this commit from triggering another run
      - name: 💾 Save updated state
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state.json
          git diff --staged --quiet || git commit -m "chore: update state [skip ci]"
          git push
